resources:
  jobs:
    provider_utilization_pipeline:
      name: provider_utilization_pipeline
      trigger:
        file_arrival:
          url: ${var.raw_external_location}/provider_utilization/
      tasks:
        - task_key: bronze
          notebook_task:
            notebook_path: ../notebooks/bronze/01_bronze_ingestion.ipynb
        - task_key: silver
          depends_on:
            - task_key: bronze
          notebook_task:
            notebook_path: ../notebooks/silver/02_silver_transform.ipynb
        - task_key: gold
          depends_on:
            - task_key: silver
          notebook_task:
            notebook_path: ../notebooks/gold/03_gold_aggregation.ipynb